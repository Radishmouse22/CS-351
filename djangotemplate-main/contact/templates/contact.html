{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% load static %}
{% block title %}Contact{% endblock %}
{% block content %}
    <!-- The top header section -->
    <section class="cta">
        <h1>Contact</h1>
    </section>
    <section>
        <div class="container">
            <div class="row">
                <div class="col-md-6">
                    <form id="contact-form" method="POST" enctype="multipart/form-data" class="mb-2">
                        {% csrf_token %}
                        {{ form|crispy }}
                    </form>
                    <button type="submit" class="btn btn-primary btn-lg" form="contact-form">Message</button>
                </div>
                <div class="col-md-6 contact-col">
                    <h3>Email</h3>
                    <p>example-user@gmail.com</p>
                    <h3>Phone Number</h3>
                    <p>(000)-000-0000</p>
                    <h3>Discord</h3>
                    <p><a href="discord.gg/example">discord.gg/example</a></p>
                </div>
            </div>
        </div>
    </section>
{% endblock %}
